version: "3.8"
services:
  neo4j:
    image: neo4j:5
    container_name: sdg-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_databases_default__listen__address=0.0.0.0
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4JLABS_PLUGINS=["apoc","graph-data-science"]
    ports: ["7474:7474","7687:7687"]
    volumes:
      - neo4j_data:/data
  backend:
    build: ./backend
    image: sdg-backend
    container_name: sdg-backend
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=password
    ports: ["8000:8000"]
    depends_on: [neo4j]
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    image: sdg-streamlit
    container_name: sdg-streamlit
    environment:
      - BACKEND_URL=http://backend:8000
    ports: ["8501:8501"]
    depends_on: [backend]
volumes:
  neo4j_data: